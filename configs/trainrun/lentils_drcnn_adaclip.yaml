# @package _global_

defaults:
  - /training@training: default
  - _self_

name: lentils_drcnn_adaclip

output_dir: ./outputs/${name}

# Limit how many training frames are used to compute MinMaxNormalizer global
# running min/max (use_running_stats=True). Set to null for full-data behavior.
minmax_init_frames: 30

# Multi-file data config (not using SingleCu3sDataModule)
data:
  splits_csv: lentils_splits.csv
  batch_size: 4
  processing_mode: Reflectance

training:
  seed: 42
  trainer:
    max_epochs: 30
    accelerator: auto
    devices: 1
    default_root_dir: ${output_dir}
    precision: 32-true
    accumulate_grad_batches: 1
    enable_progress_bar: true
    enable_checkpointing: true
    log_every_n_steps: 10
    val_check_interval: 1.0
    check_val_every_n_epoch: 1
    gradient_clip_val: 1.0
    deterministic: false
    benchmark: false
  optimizer:
    name: adamw
    lr: 0.001
    weight_decay: 0.01
    betas: [0.9, 0.999]
  scheduler:
    name: reduce_on_plateau
    monitor: metrics_anomaly/iou
    mode: max
    factor: 0.5
    patience: 5
    threshold: 0.0001
    threshold_mode: rel
    cooldown: 0
    min_lr: 1e-6
    eps: 1e-8
    verbose: false

unfreeze_nodes:
  - channel_mixer

loss_nodes:
  - iou_loss

metric_nodes:
  - metrics_anomaly

freeze_nodes: []
