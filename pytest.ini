[pytest]
# Pytest configuration for cuvis-ai-adaclip

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Prevent pytest from searching parent/sibling directories or upstream code
norecursedirs = .* build dist CVS _darcs {arch} *.egg venv .venv .git .hg .bzr .tox __pycache__ node_modules .. method dataset adaclip_tools data_preprocess

# Output options
addopts =
    -v
    -ra
    --showlocals
    --strict-markers
    --tb=short
    --color=yes

# Strict xfail: unexpectedly passing xfail tests are reported as failures
xfail_strict = true

# Markers for test categorization
markers =
    unit: Unit tests for individual components
    integration: Integration tests across multiple components
    slow: Tests that take significant time to run
    gpu: Tests that require GPU hardware

# Coverage options (when using pytest-cov)
# Run with: uv run python -m pytest --cov=cuvis_ai_adaclip tests/

# Logging
log_cli = false
log_cli_level = INFO

# Filter warnings
filterwarnings =
    ignore:.*num_workers.*:UserWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore:Module already imported so cannot be rewritten

# Minimum Python version
minversion = 7.0
